x-frappe-image: &frappe-image
  build:
    context: ../..
    dockerfile: Dockerfile
    args:
      FRAPPE_BRANCH: ${FRAPPE_BRANCH}
  image: local/frappe-dev:${FRAPPE_BRANCH}

services:
  backend:
    <<: *frappe-image
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      redis-socketio:
        condition: service_started
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e;
        cd /home/frappe/frappe-bench;
        mkdir -p sites;
        if [[ ! -f sites/common_site_config.json ]]; then
          echo "{}" > sites/common_site_config.json;
        fi;
        if [[ ! -d apps/erpnext ]]; then
          bench get-app --skip-assets --branch $$FRAPPE_BRANCH erpnext https://github.com/frappe/erpnext.git;
        fi;
        if [[ -d apps/erpnext ]]; then env/bin/pip install -q -e apps/erpnext; fi;
        env/bin/pip install -q -e apps/frappe;
        for app in $$(ls -1 apps); do
          if [[ "$$app" != "frappe" && "$$app" != "erpnext" ]] && [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            env/bin/pip install -q -e "apps/$$app";
          fi;
        done;
        if [[ -f "apps/frappe/package.json" ]]; then
          cd apps/frappe && yarn install --check-files && cd /home/frappe/frappe-bench;
        fi;
        if [[ -f "apps/erpnext/package.json" ]]; then
          cd apps/erpnext && yarn install --check-files && cd /home/frappe/frappe-bench;
        fi;
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_SOCKETIO";
        if [[ ! -f "sites/assets/assets.json" ]] || ! grep -q "erpnext-web.bundle" "sites/assets/assets.json"; then
          bench build --apps frappe,erpnext;
        fi;
        exec /home/frappe/frappe-bench/env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 \
          --threads=4 \
          --workers=2 \
          --worker-class=gthread \
          --worker-tmp-dir=/dev/shm \
          --timeout=120 \
          --preload \
          frappe.app:application;
    environment:
      FRAPPE_BRANCH: ${FRAPPE_BRANCH}
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
      FRAPPE_SOCKETIO: redis-socketio:6379
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  websocket:
    <<: *frappe-image
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e;
        cd /home/frappe/frappe-bench;
        if [[ -d apps/erpnext ]]; then env/bin/pip install -q -e apps/erpnext; fi;
        env/bin/pip install -q -e apps/frappe;
        for app in $$(ls -1 apps); do
          if [[ "$$app" != "frappe" && "$$app" != "erpnext" ]] && [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            env/bin/pip install -q -e "apps/$$app";
          fi;
        done;
        if [[ -f "apps/frappe/package.json" ]]; then
          cd apps/frappe && yarn install --check-files && cd /home/frappe/frappe-bench;
        fi;
        if [[ -f "apps/erpnext/package.json" ]]; then
          cd apps/erpnext && yarn install --check-files && cd /home/frappe/frappe-bench;
        fi;
        exec node /home/frappe/frappe-bench/apps/frappe/socketio.js;
    environment:
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
      SOCKETIO_PORT: "9000"
      REDIS_URL: redis://redis-socketio:6379
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  queue-short:
    <<: *frappe-image
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e;
        cd /home/frappe/frappe-bench;
        if [[ -d apps/erpnext ]]; then env/bin/pip install -q -e apps/erpnext; fi;
        env/bin/pip install -q -e apps/frappe;
        for app in $$(ls -1 apps); do
          if [[ "$$app" != "frappe" && "$$app" != "erpnext" ]] && [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            env/bin/pip install -q -e "apps/$$app";
          fi;
        done;
        exec bench worker --queue short,default;
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  queue-long:
    <<: *frappe-image
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e;
        cd /home/frappe/frappe-bench;
        if [[ -d apps/erpnext ]]; then env/bin/pip install -q -e apps/erpnext; fi;
        env/bin/pip install -q -e apps/frappe;
        for app in $$(ls -1 apps); do
          if [[ "$$app" != "frappe" && "$$app" != "erpnext" ]] && [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            env/bin/pip install -q -e "apps/$$app";
          fi;
        done;
        exec bench worker --queue long,default,short;
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  scheduler:
    <<: *frappe-image
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e;
        cd /home/frappe/frappe-bench;
        if [[ -d apps/erpnext ]]; then env/bin/pip install -q -e apps/erpnext; fi;
        env/bin/pip install -q -e apps/frappe;
        for app in $$(ls -1 apps); do
          if [[ "$$app" != "frappe" && "$$app" != "erpnext" ]] && [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            env/bin/pip install -q -e "apps/$$app";
          fi;
        done;
        exec bench schedule;
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  db:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./data/db:/var/lib/mysql

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis-queue:/data

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis-cache:/data

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis-socketio:/data

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - websocket
    entrypoint:
      - sh
      - -c
    command:
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 8080;
          client_max_body_size 50m;
          resolver 127.0.0.11 ipv6=off valid=30s;

          location /assets/ {
            alias /home/frappe/frappe-bench/sites/assets/;
            access_log off;
            expires 1y;
          }

          location /socket.io/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host ${SITE_NAME};
            set $$ws_upstream websocket:9000;
            proxy_pass http://$$ws_upstream/socket.io/;
          }

          location / {
            proxy_set_header Host ${SITE_NAME};
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            set $$backend_upstream backend:8000;
            proxy_pass http://$$backend_upstream;
          }
        }
        EOF
        exec nginx -g 'daemon off;';
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites:ro
      - ./data/apps:/home/frappe/frappe-bench/apps:ro
    ports:
      - "${HTTP_PORT}:8080"
