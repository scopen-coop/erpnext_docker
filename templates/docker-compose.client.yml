x-frappe-image: &frappe-image
  build:
    context: ../..
    dockerfile: Dockerfile
    args:
      FRAPPE_BRANCH: ${FRAPPE_BRANCH}
  image: local/frappe-dev:${FRAPPE_BRANCH}

# Commandes partagées entre services (pip install + yarn pour toutes les apps)
x-app-bootstrap: &app-bootstrap
  entrypoint:
    - bash
    - -c
  # Le snippet ci-dessous est le même pour tous les workers — seule la commande finale diffère
  # $$VAR = variable Docker Compose (échappée), $VAR = variable shell dans le container

x-app-volumes: &app-volumes
  volumes:
    - ./data/apps:/home/frappe/frappe-bench/apps
    - ./data/sites:/home/frappe/frappe-bench/sites
    - ./data/logs:/home/frappe/frappe-bench/logs

x-app-env: &app-env
  environment:
    FRAPPE_BRANCH: ${FRAPPE_BRANCH}
    DB_HOST: db
    DB_PORT: "3306"
    REDIS_CACHE: redis-cache:6379
    REDIS_QUEUE: redis-queue:6379
    REDIS_SOCKETIO: redis-socketio:6379
    FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
    FRAPPE_REDIS_CACHE: redis://redis-cache:6379
    FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    FRAPPE_SOCKETIO: redis-socketio:6379
    HTTP_PORT: ${HTTP_PORT}

services:
  backend:
    <<: [*frappe-image, *app-volumes, *app-env]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      redis-socketio:
        condition: service_started
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e
        cd /home/frappe/frappe-bench
        mkdir -p sites

        # 1. apps.txt + common_site_config AVANT tout appel bench
        if [[ ! -f sites/common_site_config.json ]]; then
          echo "{}" > sites/common_site_config.json
        fi
        ls -1 apps > sites/apps.txt
        ln -snf sites/apps.txt apps.txt

        # 2. Pip install de toutes les apps AVANT bench set-config (frappe importe tout)
        for app in $$(ls -1 apps 2>/dev/null); do
          if [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            if ! env/bin/python -c "import importlib; importlib.import_module('$$app')" >/dev/null 2>&1; then
              echo "[bootstrap] pip install $$app"
              env/bin/pip install -q -e "apps/$$app"
            fi
          fi
        done

        # 3. Config globale Redis/DB (après pip install)
        bench set-config -g db_host $$DB_HOST
        bench set-config -gp db_port $$DB_PORT
        bench set-config -g redis_cache "redis://$$REDIS_CACHE"
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE"
        bench set-config -g redis_socketio "redis://$$REDIS_SOCKETIO"
        # socketio_port = port nginx du client → le navigateur se connecte via nginx, pas directement
        bench set-config -gp socketio_port $$HTTP_PORT

        # Yarn install pour les apps avec package.json
        for app in $$(ls -1 apps 2>/dev/null); do
          if [[ -f "apps/$$app/package.json" ]]; then
            echo "[bootstrap] yarn install $$app"
            cd "apps/$$app" && yarn install --check-files --silent 2>/dev/null; cd /home/frappe/frappe-bench
          fi
        done

        # Build des assets si nécessaire
        APPS_WITH_BUNDLES=""
        for app in $$(ls -1 apps 2>/dev/null); do
          if [[ -f "apps/$$app/package.json" ]]; then
            APPS_WITH_BUNDLES="$${APPS_WITH_BUNDLES:+$$APPS_WITH_BUNDLES,}$$app"
          fi
        done
        if [[ -n "$$APPS_WITH_BUNDLES" ]]; then
          ASSET_CHECK_APP="$$(echo "$$APPS_WITH_BUNDLES" | tr ',' '\n' | tail -n1)"
          if [[ ! -f "sites/assets/assets.json" ]] || ! grep -q "$${ASSET_CHECK_APP}" "sites/assets/assets.json" 2>/dev/null; then
            echo "[bootstrap] bench build --apps $$APPS_WITH_BUNDLES"
            bench build --apps "$$APPS_WITH_BUNDLES"
          fi
        fi

        exec env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 \
          --threads=4 \
          --workers=2 \
          --worker-class=gthread \
          --worker-tmp-dir=/dev/shm \
          --timeout=120 \
          --preload \
          frappe.app:application

  websocket:
    <<: [*frappe-image, *app-volumes]
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e
        cd /home/frappe/frappe-bench
        for app in $$(ls -1 apps 2>/dev/null); do
          if [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            if ! env/bin/python -c "import importlib; importlib.import_module('$$app')" >/dev/null 2>&1; then
              env/bin/pip install -q -e "apps/$$app"
            fi
          fi
        done
        exec node /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
      SOCKETIO_PORT: "9000"
      REDIS_URL: redis://redis-socketio:6379

  queue-short:
    <<: [*frappe-image, *app-volumes]
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e
        cd /home/frappe/frappe-bench
        for app in $$(ls -1 apps 2>/dev/null); do
          if [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            if ! env/bin/python -c "import importlib; importlib.import_module('$$app')" >/dev/null 2>&1; then
              env/bin/pip install -q -e "apps/$$app"
            fi
          fi
        done
        exec bench worker --queue short,default

  queue-long:
    <<: [*frappe-image, *app-volumes]
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e
        cd /home/frappe/frappe-bench
        for app in $$(ls -1 apps 2>/dev/null); do
          if [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            if ! env/bin/python -c "import importlib; importlib.import_module('$$app')" >/dev/null 2>&1; then
              env/bin/pip install -q -e "apps/$$app"
            fi
          fi
        done
        exec bench worker --queue long,default,short

  scheduler:
    <<: [*frappe-image, *app-volumes]
    restart: unless-stopped
    depends_on:
      - backend
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e
        cd /home/frappe/frappe-bench
        for app in $$(ls -1 apps 2>/dev/null); do
          if [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            if ! env/bin/python -c "import importlib; importlib.import_module('$$app')" >/dev/null 2>&1; then
              env/bin/pip install -q -e "apps/$$app"
            fi
          fi
        done
        exec bench schedule

  db:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./data/db:/var/lib/mysql

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis-queue:/data

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis-cache:/data

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis-socketio:/data

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - websocket
    entrypoint:
      - sh
      - -c
    command:
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 8080;
          client_max_body_size 150m;
          resolver 127.0.0.11 ipv6=off valid=30s;

          location /assets/ {
            alias /home/frappe/frappe-bench/sites/assets/;
            access_log off;
            expires 1y;
          }

          location /socket.io/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host ${SITE_NAME};
            set $$ws_upstream websocket:9000;
            proxy_pass http://$$ws_upstream/socket.io/;
          }

          location / {
            proxy_set_header Host ${SITE_NAME};
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            set $$backend_upstream backend:8000;
            proxy_pass http://$$backend_upstream;
          }
        }
        EOF
        exec nginx -g 'daemon off;'
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites:ro
      - ./data/apps:/home/frappe/frappe-bench/apps:ro
    ports:
      - "${HTTP_PORT}:8080"
