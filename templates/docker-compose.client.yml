services:
  permissions:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    user: "0:0"
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e;
        mkdir -p /home/frappe/frappe-bench/apps /home/frappe/frappe-bench/sites /home/frappe/frappe-bench/logs;
        chown -R frappe:frappe /home/frappe/frappe-bench/apps /home/frappe/frappe-bench/sites /home/frappe/frappe-bench/logs;
        chmod -R u+rwX,g+rwX /home/frappe/frappe-bench/apps /home/frappe/frappe-bench/sites /home/frappe/frappe-bench/logs;
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  backend:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      configurator:
        condition: service_completed_successfully
      permissions:
        condition: service_completed_successfully
    entrypoint:
      - bash
      - -c
    command:
      - |
        set -e;
        cd /home/frappe/frappe-bench;
        for app in $(ls -1 apps); do
          if [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            env/bin/pip install -q -e "apps/$$app";
          fi;
        done;
        exec /home/frappe/frappe-bench/env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 \
          --threads=4 \
          --workers=2 \
          --worker-class=gthread \
          --worker-tmp-dir=/dev/shm \
          --timeout=120 \
          --preload \
          frappe.app:application;
    environment:
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
  configurator:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      permissions:
        condition: service_completed_successfully
    entrypoint:
      - bash
      - -c
    command:
      - |
        cd /home/frappe/frappe-bench;
        for app in $(ls -1 apps); do
          if [[ -f "apps/$$app/pyproject.toml" || -f "apps/$$app/setup.py" ]]; then
            env/bin/pip install -q -e "apps/$$app";
          fi;
        done;
        mkdir -p sites;
        if [[ ! -f sites/common_site_config.json ]]; then
          echo "{}" > sites/common_site_config.json;
        fi;
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  create-site:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    profiles: ["init"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      configurator:
        condition: service_completed_successfully
      permissions:
        condition: service_completed_successfully
    entrypoint:
      - bash
      - -c
    command:
      - |
        wait-for-it --host=db --port=3306 --timeout=120;
        wait-for-it --host=redis-cache --port=6379 --timeout=120;
        wait-for-it --host=redis-queue --port=6379 --timeout=120;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "missing required keys in common_site_config.json";
            exit 1;
          fi;
        done;
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=$$ADMIN_PASSWORD --db-root-username=root --db-root-password=$$DB_ROOT_PASSWORD --install-app erpnext --set-default $$SITE_NAME;
    environment:
      SITE_NAME: ${SITE_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  db:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./data/db:/var/lib/mysql

  frontend:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    restart: unless-stopped
    depends_on:
      - backend
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
      SOCKETIO: localhost:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - ./data/apps:/home/frappe/frappe-bench/apps
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
    ports:
      - "${HTTP_PORT}:8080"

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis-queue:/data

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
